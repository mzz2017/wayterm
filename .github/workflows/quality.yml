name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spm:
    name: SwiftPM tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run SwiftPM tests
        run: swift test

  ios-focused-runtime:
    name: Focused runtime lifecycle tests
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available

      - name: Run focused runtime lifecycle tests
        env:
          IOS_TEST_RETRIES: "2"
          IOS_TEST_DEVICE_NAME: iPhone 17
          IOS_TEST_DEVICE_NAME_CANDIDATES: iPhone 17,iPhone 16,iPhone 15
          IOS_TEST_ALLOW_DEVICE_FALLBACK: "1"
          IOS_TEST_PROGRESS_INTERVAL: "30"
          IOS_TEST_PROGRESS_LOG_LINES: "100"
          IOS_TEST_FAILURE_LOG_LINES: "500"
        run: |
          focused_args=(
            "-only-testing:VVTermTests/AppSyncCoordinatorTests"
            "-only-testing:VVTermTests/CloudKitSyncCoordinatorLifecycleTests"
            "-only-testing:VVTermTests/CloudflareTransportManagerLifecycleTests"
            "-only-testing:VVTermTests/ConnectionRuntimeRegistryLifecycleTests"
            "-only-testing:VVTermTests/ConnectionRuntimeRunnerLifecycleTests"
            "-only-testing:VVTermTests/LibSSH2SessionLifecycleTests"
            "-only-testing:VVTermTests/RemoteFileBrowserRequestLifecycleTests"
            "-only-testing:VVTermTests/ServerStatsCollectorLifecycleTests"
            "-only-testing:VVTermTests/SSHClientConnectionLifecycleTests"
            "-only-testing:VVTermTests/StoreManagerLifecycleTests"
            "-only-testing:VVTermTests/TerminalConnectionRuntimeTests"
            "-only-testing:VVTermTests/TerminalConnectionRunnerTests"
            "-only-testing:VVTermTests/TerminalVoiceInputStoreTests"
          )

          echo "::group::Focused runtime lifecycle diagnostics"
          echo "Focused test filter count: ${#focused_args[@]}"
          echo "IOS_TEST_RETRIES=${IOS_TEST_RETRIES}"
          echo "IOS_TEST_DEVICE_NAME=${IOS_TEST_DEVICE_NAME}"
          echo "IOS_TEST_DEVICE_NAME_CANDIDATES=${IOS_TEST_DEVICE_NAME_CANDIDATES}"
          echo "IOS_TEST_PROGRESS_INTERVAL=${IOS_TEST_PROGRESS_INTERVAL}"
          echo "IOS_TEST_PROGRESS_LOG_LINES=${IOS_TEST_PROGRESS_LOG_LINES}"
          echo "IOS_TEST_FAILURE_LOG_LINES=${IOS_TEST_FAILURE_LOG_LINES}"
          echo "::endgroup::"

          echo "::group::Focused runtime lifecycle test filters"
          printf '%s\n' "${focused_args[@]}"
          echo "::endgroup::"

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            {
              echo "### Focused runtime lifecycle tests"
              echo
              echo "- Filter count: ${#focused_args[@]}"
              echo "- Device candidates: ${IOS_TEST_DEVICE_NAME_CANDIDATES}"
              echo "- Retries: ${IOS_TEST_RETRIES}"
              echo "- Progress interval: ${IOS_TEST_PROGRESS_INTERVAL}s"
              echo "- Progress tail: ${IOS_TEST_PROGRESS_LOG_LINES} lines"
              echo "- Failure tail: ${IOS_TEST_FAILURE_LOG_LINES} lines"
              echo
              echo "Filters:"
              echo
              printf -- "- \`%s\`\n" "${focused_args[@]}"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

          ./scripts/test-ios.sh "${focused_args[@]}"

  ios-strict-concurrency:
    name: Strict Swift concurrency build
    runs-on: macos-15
    needs: ios-focused-runtime
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available

      - name: Build iOS unit tests with strict concurrency
        env:
          IOS_TEST_XCODEBUILD_ACTION: build-for-testing
          IOS_TEST_RETRIES: "0"
          IOS_TEST_DEVICE_NAME: iPhone 17
          IOS_TEST_DEVICE_NAME_CANDIDATES: iPhone 17,iPhone 16,iPhone 15
          IOS_TEST_ALLOW_DEVICE_FALLBACK: "1"
          ENABLE_DEBUG_DYLIB: "NO"
          SWIFT_STRICT_CONCURRENCY: complete
        run: |
          ./scripts/test-ios.sh SWIFT_STRICT_CONCURRENCY=complete

  ios-unit:
    name: iOS unit tests
    runs-on: macos-15
    needs:
      - ios-focused-runtime
      - ios-strict-concurrency
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available

      - name: Run iOS unit tests
        env:
          IOS_TEST_RETRIES: "2"
          IOS_TEST_DEVICE_NAME: iPhone 17
          IOS_TEST_DEVICE_NAME_CANDIDATES: iPhone 17,iPhone 16,iPhone 15
          IOS_TEST_ALLOW_DEVICE_FALLBACK: "1"
        run: ./scripts/test-ios.sh

  native-sources:
    name: Native source checksums
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify native source archives
        run: ./scripts/build.sh check-ssh-sources
