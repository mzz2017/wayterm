name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spm:
    name: SwiftPM tests
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Restore SwiftPM cache
        uses: actions/cache@v6
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Run SwiftPM tests
        run: swift test

      - name: Run iOS wrapper self-tests
        run: ./scripts/test-ios-ramdisk-self-test.sh

  macos-app-build:
    name: macOS app build
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Configure macOS build paths
        run: |
          {
            echo "MACOS_DERIVED_DATA_PATH=${RUNNER_TEMP}/waterm-macos-derived-data"
            echo "MACOS_XCODE_LOG_DIR=${RUNNER_TEMP}/waterm-macos-build-logs"
            echo "XCODE_CLONED_SOURCE_PACKAGES_DIR=${GITHUB_WORKSPACE}/.xcode-cloned-source-packages"
          } >> "${GITHUB_ENV}"

      - name: Restore Xcode package cache
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.xcode-cloned-source-packages
          key: xcode-spm-${{ runner.os }}-macos-${{ hashFiles('Waterm.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            xcode-spm-${{ runner.os }}-macos-
            xcode-spm-${{ runner.os }}-

      - name: Show macOS build diagnostics
        run: |
          mkdir -p "${MACOS_XCODE_LOG_DIR}"
          echo "::group::macOS app build diagnostics"
          echo "MACOS_DERIVED_DATA_PATH=${MACOS_DERIVED_DATA_PATH}"
          echo "MACOS_XCODE_LOG_DIR=${MACOS_XCODE_LOG_DIR}"
          echo "XCODE_CLONED_SOURCE_PACKAGES_DIR=${XCODE_CLONED_SOURCE_PACKAGES_DIR}"
          echo "RUNNER_TEMP=${RUNNER_TEMP}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "xcode-select: $(xcode-select -p)"
          echo "disk usage:"
          df -h .
          df -h "${RUNNER_TEMP}"
          echo "::endgroup::"

      - name: Build macOS app target
        run: |
          set -o pipefail
          xcodebuild build \
            -project Waterm.xcodeproj \
            -scheme Waterm \
            -destination 'platform=macOS' \
            -derivedDataPath "${MACOS_DERIVED_DATA_PATH}" \
            -clonedSourcePackagesDirPath "${XCODE_CLONED_SOURCE_PACKAGES_DIR}" \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_DEBUG_DYLIB=NO \
            | tee "${MACOS_XCODE_LOG_DIR}/xcodebuild-macos-build.log"

      - name: Upload macOS build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macos-app-build-xcodebuild-logs
          path: ${{ runner.temp }}/waterm-macos-build-logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Clean macOS DerivedData
        if: always()
        run: |
          for attempt in 1 2 3; do
            rm -rf "${MACOS_DERIVED_DATA_PATH}" && exit 0
            echo "DerivedData cleanup attempt ${attempt} failed; retrying..."
            sleep 5
          done
          echo "::warning::Unable to remove macOS DerivedData at ${MACOS_DERIVED_DATA_PATH}"

  ios-focused-runtime:
    name: Focused runtime lifecycle tests
    runs-on: macos-15
    timeout-minutes: 45
    env:
      IOS_TEST_DEVICE_NAME: iPhone 17
      IOS_TEST_DEVICE_NAME_CANDIDATES: iPhone 17,iPhone 16,iPhone 15
      IOS_TEST_ALLOW_DEVICE_FALLBACK: "1"
      IOS_TEST_PROGRESS_INTERVAL: "30"
      IOS_TEST_PROGRESS_LOG_LINES: "100"
      IOS_TEST_FAILURE_LOG_LINES: "500"
      IOS_TEST_KEEP_DERIVED_DATA: "1"
      IOS_TEST_RAMDISK_MB: "0"
      IOS_FOCUSED_RUNTIME_SYNC_CLOUDFLARE_FILTERS: |
        -only-testing:WatermTests/AppSyncCoordinatorTests
        -only-testing:WatermTests/CloudKitSyncCoordinatorLifecycleTests
        -only-testing:WatermTests/CloudflareTransportManagerLifecycleTests
      IOS_FOCUSED_RUNTIME_TERMINAL_SSH_FILTERS: |
        -only-testing:WatermTests/ConnectionRuntimeRegistryLifecycleTests
        -only-testing:WatermTests/ConnectionRuntimeRunnerLifecycleTests
        -only-testing:WatermTests/LibSSH2SessionLifecycleTests
        -only-testing:WatermTests/SSHClientConnectionLifecycleTests
        -only-testing:WatermTests/TerminalConnectionRuntimeTests
        -only-testing:WatermTests/TerminalConnectionRunnerTests
      IOS_FOCUSED_RUNTIME_REMOTEFILES_STATS_STORE_VOICE_FILTERS: |
        -only-testing:WatermTests/RemoteFileBrowserRequestLifecycleTests
        -only-testing:WatermTests/ServerStatsCollectorLifecycleTests
        -only-testing:WatermTests/StoreManagerLifecycleTests
        -only-testing:WatermTests/TerminalVoiceInputStoreTests

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available

      - name: Configure focused runtime paths
        run: |
          {
            echo "IOS_TEST_DERIVED_DATA_PATH=${RUNNER_TEMP}/waterm-ios-focused-runtime-derived-data"
            echo "IOS_TEST_LOG_DIR=${RUNNER_TEMP}/waterm-ios-focused-runtime-logs/build"
            echo "IOS_TEST_CLONED_SOURCE_PACKAGES_DIR=${GITHUB_WORKSPACE}/.xcode-cloned-source-packages"
          } >> "${GITHUB_ENV}"

      - name: Restore Xcode package cache
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.xcode-cloned-source-packages
          key: xcode-spm-${{ runner.os }}-focused-runtime-${{ hashFiles('Waterm.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            xcode-spm-${{ runner.os }}-focused-runtime-
            xcode-spm-${{ runner.os }}-

      - name: Show focused runtime diagnostics
        run: |
          focused_args=()
          for filters in \
            "${IOS_FOCUSED_RUNTIME_SYNC_CLOUDFLARE_FILTERS}" \
            "${IOS_FOCUSED_RUNTIME_TERMINAL_SSH_FILTERS}" \
            "${IOS_FOCUSED_RUNTIME_REMOTEFILES_STATS_STORE_VOICE_FILTERS}"; do
            while IFS= read -r filter; do
              [[ -n "${filter}" ]] && focused_args+=("${filter}")
            done <<< "${filters}"
          done
          mkdir -p "${IOS_TEST_LOG_DIR}"

          echo "::group::Focused runtime lifecycle diagnostics"
          echo "Focused test filter count: ${#focused_args[@]}"
          echo "Focused build strategy: one build-for-testing, three test-without-building shards"
          echo "IOS_TEST_DEVICE_NAME=${IOS_TEST_DEVICE_NAME}"
          echo "IOS_TEST_DEVICE_NAME_CANDIDATES=${IOS_TEST_DEVICE_NAME_CANDIDATES}"
          echo "IOS_TEST_PROGRESS_INTERVAL=${IOS_TEST_PROGRESS_INTERVAL}"
          echo "IOS_TEST_PROGRESS_LOG_LINES=${IOS_TEST_PROGRESS_LOG_LINES}"
          echo "IOS_TEST_FAILURE_LOG_LINES=${IOS_TEST_FAILURE_LOG_LINES}"
          echo "IOS_TEST_DERIVED_DATA_PATH=${IOS_TEST_DERIVED_DATA_PATH}"
          echo "IOS_TEST_KEEP_DERIVED_DATA=${IOS_TEST_KEEP_DERIVED_DATA}"
          echo "IOS_TEST_LOG_DIR=${IOS_TEST_LOG_DIR}"
          echo "IOS_TEST_CLONED_SOURCE_PACKAGES_DIR=${IOS_TEST_CLONED_SOURCE_PACKAGES_DIR:-default}"
          echo "IOS_TEST_NO_OUTPUT_TIMEOUT=${IOS_TEST_NO_OUTPUT_TIMEOUT:-default}"
          echo "RUNNER_TEMP=${RUNNER_TEMP}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "xcode-select: $(xcode-select -p)"
          echo "disk usage:"
          df -h .
          df -h "${RUNNER_TEMP}"
          echo "::endgroup::"

          echo "::group::Focused runtime lifecycle test filters"
          printf '%s\n' "${focused_args[@]}"
          echo "::endgroup::"

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            {
              echo "### Focused runtime lifecycle tests"
              echo
              echo "- Filter count: ${#focused_args[@]}"
              echo "- Build/test split: one build-for-testing, then three test-without-building shards"
              echo "- Device candidates: ${IOS_TEST_DEVICE_NAME_CANDIDATES}"
              echo "- Test retries: 2"
              echo "- DerivedData: ${IOS_TEST_DERIVED_DATA_PATH}"
              echo "- Package cache: ${IOS_TEST_CLONED_SOURCE_PACKAGES_DIR:-default}"
              echo "- Progress interval: ${IOS_TEST_PROGRESS_INTERVAL}s"
              echo "- Progress tail: ${IOS_TEST_PROGRESS_LOG_LINES} lines"
              echo "- Failure tail: ${IOS_TEST_FAILURE_LOG_LINES} lines"
              echo "- Full xcodebuild logs: ${IOS_TEST_LOG_DIR}"
              echo
              echo "Filters:"
              echo
              printf -- "- \`%s\`\n" "${focused_args[@]}"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Build focused runtime lifecycle tests
        env:
          IOS_TEST_CONTEXT: focused-runtime-build
          IOS_TEST_XCODEBUILD_ACTION: build-for-testing
          IOS_TEST_RETRIES: "0"
          IOS_TEST_RESULT_BUNDLE_DIR: ${{ runner.temp }}/waterm-ios-focused-runtime-logs/build/result-bundles
        run: |
          set -x
          ./scripts/test-ios.sh

      - name: Run focused runtime lifecycle tests (sync-cloudflare)
        env:
          IOS_TEST_CONTEXT: focused-runtime-sync-cloudflare
          IOS_TEST_XCODEBUILD_ACTION: test-without-building
          IOS_TEST_RETRIES: "2"
          IOS_TEST_NO_OUTPUT_TIMEOUT: "300"
          IOS_TEST_LOG_DIR: ${{ runner.temp }}/waterm-ios-focused-runtime-logs/sync-cloudflare
          IOS_TEST_RESULT_BUNDLE_DIR: ${{ runner.temp }}/waterm-ios-focused-runtime-logs/sync-cloudflare/result-bundles
        run: |
          set -x
          focused_args=()
          while IFS= read -r filter; do
            [[ -n "${filter}" ]] && focused_args+=("${filter}")
          done <<< "${IOS_FOCUSED_RUNTIME_SYNC_CLOUDFLARE_FILTERS}"
          ./scripts/test-ios.sh "${focused_args[@]}"

      - name: Run focused runtime lifecycle tests (terminal-ssh)
        env:
          IOS_TEST_CONTEXT: focused-runtime-terminal-ssh
          IOS_TEST_XCODEBUILD_ACTION: test-without-building
          IOS_TEST_RETRIES: "2"
          IOS_TEST_NO_OUTPUT_TIMEOUT: "300"
          IOS_TEST_LOG_DIR: ${{ runner.temp }}/waterm-ios-focused-runtime-logs/terminal-ssh
          IOS_TEST_RESULT_BUNDLE_DIR: ${{ runner.temp }}/waterm-ios-focused-runtime-logs/terminal-ssh/result-bundles
        run: |
          set -x
          focused_args=()
          while IFS= read -r filter; do
            [[ -n "${filter}" ]] && focused_args+=("${filter}")
          done <<< "${IOS_FOCUSED_RUNTIME_TERMINAL_SSH_FILTERS}"
          ./scripts/test-ios.sh "${focused_args[@]}"

      - name: Run focused runtime lifecycle tests (remotefiles-stats-store-voice)
        env:
          IOS_TEST_CONTEXT: focused-runtime-remotefiles-stats-store-voice
          IOS_TEST_XCODEBUILD_ACTION: test-without-building
          IOS_TEST_RETRIES: "2"
          IOS_TEST_NO_OUTPUT_TIMEOUT: "300"
          IOS_TEST_LOG_DIR: ${{ runner.temp }}/waterm-ios-focused-runtime-logs/remotefiles-stats-store-voice
          IOS_TEST_RESULT_BUNDLE_DIR: ${{ runner.temp }}/waterm-ios-focused-runtime-logs/remotefiles-stats-store-voice/result-bundles
        run: |
          set -x
          focused_args=()
          while IFS= read -r filter; do
            [[ -n "${filter}" ]] && focused_args+=("${filter}")
          done <<< "${IOS_FOCUSED_RUNTIME_REMOTEFILES_STATS_STORE_VOICE_FILTERS}"
          ./scripts/test-ios.sh "${focused_args[@]}"

      - name: Upload focused runtime lifecycle logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: focused-runtime-lifecycle-xcodebuild-logs
          path: ${{ runner.temp }}/waterm-ios-focused-runtime-logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Clean focused runtime DerivedData
        if: always()
        run: |
          for attempt in 1 2 3; do
            rm -rf "${IOS_TEST_DERIVED_DATA_PATH}" && exit 0
            echo "DerivedData cleanup attempt ${attempt} failed; retrying..."
            sleep 5
          done
          echo "::warning::Unable to remove focused runtime DerivedData at ${IOS_TEST_DERIVED_DATA_PATH}"

  ios-strict-concurrency:
    name: Strict Swift concurrency build
    runs-on: macos-15
    needs: ios-focused-runtime
    timeout-minutes: 75
    env:
      IOS_TEST_XCODEBUILD_ACTION: build-for-testing
      IOS_TEST_RETRIES: "0"
      IOS_TEST_DEVICE_NAME: iPhone 17
      IOS_TEST_DEVICE_NAME_CANDIDATES: iPhone 17,iPhone 16,iPhone 15
      IOS_TEST_ALLOW_DEVICE_FALLBACK: "1"
      IOS_TEST_PROGRESS_INTERVAL: "30"
      IOS_TEST_PROGRESS_LOG_LINES: "100"
      IOS_TEST_FAILURE_LOG_LINES: "500"
      IOS_TEST_KEEP_DERIVED_DATA: "1"
      IOS_TEST_RAMDISK_MB: "0"
      IOS_TEST_FAIL_ON_SWIFT_CONCURRENCY_WARNINGS: "1"
      ENABLE_DEBUG_DYLIB: "NO"
      SWIFT_STRICT_CONCURRENCY: complete

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available

      - name: Configure strict build paths
        run: |
          {
            echo "IOS_TEST_DERIVED_DATA_PATH=${RUNNER_TEMP}/waterm-ios-strict-derived-data"
            echo "IOS_TEST_LOG_DIR=${RUNNER_TEMP}/waterm-ios-strict-logs"
            echo "IOS_TEST_CLONED_SOURCE_PACKAGES_DIR=${GITHUB_WORKSPACE}/.xcode-cloned-source-packages"
          } >> "${GITHUB_ENV}"

      - name: Restore Xcode package cache
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.xcode-cloned-source-packages
          key: xcode-spm-${{ runner.os }}-strict-${{ hashFiles('Waterm.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            xcode-spm-${{ runner.os }}-strict-
            xcode-spm-${{ runner.os }}-

      - name: Show strict build diagnostics
        run: |
          mkdir -p "${IOS_TEST_LOG_DIR}"
          echo "::group::Strict Swift concurrency diagnostics"
          echo "IOS_TEST_DERIVED_DATA_PATH=${IOS_TEST_DERIVED_DATA_PATH}"
          echo "IOS_TEST_LOG_DIR=${IOS_TEST_LOG_DIR}"
          echo "IOS_TEST_CLONED_SOURCE_PACKAGES_DIR=${IOS_TEST_CLONED_SOURCE_PACKAGES_DIR:-default}"
          echo "IOS_TEST_PROGRESS_INTERVAL=${IOS_TEST_PROGRESS_INTERVAL}"
          echo "IOS_TEST_FAILURE_LOG_LINES=${IOS_TEST_FAILURE_LOG_LINES}"
          echo "SWIFT_STRICT_CONCURRENCY=${SWIFT_STRICT_CONCURRENCY}"
          echo "RUNNER_TEMP=${RUNNER_TEMP}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "xcode-select: $(xcode-select -p)"
          echo "disk usage:"
          df -h .
          df -h "${RUNNER_TEMP}"
          echo "::endgroup::"

      - name: Build iOS unit tests with strict concurrency
        env:
          IOS_TEST_CONTEXT: strict-swift-concurrency-build
          IOS_TEST_RESULT_BUNDLE_DIR: ${{ runner.temp }}/waterm-ios-strict-logs/result-bundles
        run: |
          ./scripts/test-ios.sh SWIFT_STRICT_CONCURRENCY=complete

      - name: Upload strict Swift concurrency logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: strict-swift-concurrency-xcodebuild-logs
          path: ${{ runner.temp }}/waterm-ios-strict-logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Clean strict DerivedData
        if: always()
        run: |
          for attempt in 1 2 3; do
            rm -rf "${IOS_TEST_DERIVED_DATA_PATH}" && exit 0
            echo "DerivedData cleanup attempt ${attempt} failed; retrying..."
            sleep 5
          done
          echo "::warning::Unable to remove strict DerivedData at ${IOS_TEST_DERIVED_DATA_PATH}"

  ios-unit:
    name: iOS unit tests
    runs-on: macos-15
    needs:
      - ios-focused-runtime
      - ios-strict-concurrency
    timeout-minutes: 60
    env:
      IOS_TEST_RETRIES: "2"
      IOS_TEST_DEVICE_NAME: iPhone 17
      IOS_TEST_DEVICE_NAME_CANDIDATES: iPhone 17,iPhone 16,iPhone 15
      IOS_TEST_ALLOW_DEVICE_FALLBACK: "1"
      IOS_TEST_PROGRESS_INTERVAL: "30"
      IOS_TEST_PROGRESS_LOG_LINES: "100"
      IOS_TEST_FAILURE_LOG_LINES: "500"
      IOS_TEST_KEEP_DERIVED_DATA: "1"
      IOS_TEST_RAMDISK_MB: "0"
      IOS_TEST_REQUIRE_EXECUTED_TESTS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun simctl list devices available

      - name: Configure iOS unit test paths
        run: |
          {
            echo "IOS_TEST_DERIVED_DATA_PATH=${RUNNER_TEMP}/waterm-ios-unit-derived-data"
            echo "IOS_TEST_LOG_DIR=${RUNNER_TEMP}/waterm-ios-unit-logs"
            echo "IOS_TEST_CLONED_SOURCE_PACKAGES_DIR=${GITHUB_WORKSPACE}/.xcode-cloned-source-packages"
          } >> "${GITHUB_ENV}"

      - name: Restore Xcode package cache
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.xcode-cloned-source-packages
          key: xcode-spm-${{ runner.os }}-unit-${{ hashFiles('Waterm.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            xcode-spm-${{ runner.os }}-unit-
            xcode-spm-${{ runner.os }}-

      - name: Show iOS unit test diagnostics
        run: |
          mkdir -p "${IOS_TEST_LOG_DIR}"
          echo "::group::iOS unit test diagnostics"
          echo "IOS_TEST_DERIVED_DATA_PATH=${IOS_TEST_DERIVED_DATA_PATH}"
          echo "IOS_TEST_LOG_DIR=${IOS_TEST_LOG_DIR}"
          echo "IOS_TEST_CLONED_SOURCE_PACKAGES_DIR=${IOS_TEST_CLONED_SOURCE_PACKAGES_DIR:-default}"
          echo "IOS_TEST_RETRIES=${IOS_TEST_RETRIES}"
          echo "IOS_TEST_PROGRESS_INTERVAL=${IOS_TEST_PROGRESS_INTERVAL}"
          echo "IOS_TEST_FAILURE_LOG_LINES=${IOS_TEST_FAILURE_LOG_LINES}"
          echo "RUNNER_TEMP=${RUNNER_TEMP}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "xcode-select: $(xcode-select -p)"
          echo "disk usage:"
          df -h .
          df -h "${RUNNER_TEMP}"
          echo "::endgroup::"

      - name: Run iOS unit tests
        env:
          IOS_TEST_CONTEXT: ios-unit-tests
          IOS_TEST_RESULT_BUNDLE_DIR: ${{ runner.temp }}/waterm-ios-unit-logs/result-bundles
        run: ./scripts/test-ios.sh

      - name: Upload iOS unit test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-unit-xcodebuild-logs
          path: ${{ runner.temp }}/waterm-ios-unit-logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Clean iOS unit DerivedData
        if: always()
        run: |
          for attempt in 1 2 3; do
            rm -rf "${IOS_TEST_DERIVED_DATA_PATH}" && exit 0
            echo "DerivedData cleanup attempt ${attempt} failed; retrying..."
            sleep 5
          done
          echo "::warning::Unable to remove iOS unit DerivedData at ${IOS_TEST_DERIVED_DATA_PATH}"

  native-sources:
    name: Native source and vendor checks
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify SwiftPM package pins
        run: ./scripts/check-swiftpm-package-requirements.sh

      - name: Verify native source archives
        run: ./scripts/build.sh check-ssh-sources

      - name: Verify Ghostty vendor artifacts
        run: ./scripts/build.sh check-ghostty

      - name: Verify Ghostty build cleanup
        run: ./scripts/build-ghostty-cleanup-self-test.sh

      - name: Verify native vendor manifest
        run: ./scripts/build.sh check-vendor-manifest
